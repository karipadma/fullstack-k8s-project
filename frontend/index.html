<!DOCTYPE html>
<html>
<body>

<h2>Employee System</h2>

<input id="name" placeholder="Name">
<input id="role" placeholder="Role">

<button onclick="addEmp()">Add</button>
<button onclick="getEmp()">Get</button>

<pre id="out"></pre>

<script>

const API = "http://a205e67a3d0b64230a8a92d35a626357-1893057570.us-east-1.elb.amazonaws.com/api/employees";

function addEmp() {
  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      role: document.getElementById("role").value
    })
  })
  .then(r => r.json())
  .then(d => alert(JSON.stringify(d)))
  .catch(err => alert("Error: " + err));
}

function getEmp() {
  fetch(API)
    .then(r => r.json())
    .then(d => {
      document.getElementById("out").innerText =
        JSON.stringify(d, null, 2);
    })
    .catch(err => alert("Error: " + err));
}

</script>

</body>
</html>

</body>
</html>
